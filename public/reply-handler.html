<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reply Handler</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      margin-bottom: 8px;
    }

    .sub {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.7;
    }

    .box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 16px;
    }

    textarea {
      min-height: 160px;
    }

    button {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 22px;
      cursor: pointer;
    }

    .status {
      margin-top: 10px;
      color: #666;
    }

    pre {
      white-space: pre-wrap;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 20px;
      margin-top: 20px;
    }

    .label {
      font-size: 13px;
      color: #666;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <h1>Reply Handler</h1>

  <div class="sub">
    候補者返信 → AI判定 → SMS送信 → フォロー自動送信まで確認できます
  </div>

  <div class="box">
    <label>候補者名</label>
    <input id="candidate_name" value="Aさん" />

    <label>返信内容</label>
    <textarea id="reply_text">ご連絡ありがとうございます。少し興味があります。</textarea>

    <button onclick="handleReply()">AI対応する</button>
    <div class="status" id="status">待機中</div>
  </div>

  <div class="card">
    <div class="label">分類</div>
    <div class="value" id="intent">-</div>

    <div class="label">日程リンク送付</div>
    <div class="value" id="should_send">-</div>

    <div class="label">SMS文面</div>
    <pre id="sms"></pre>

    <div class="label">フォロー文面</div>
    <pre id="follow"></pre>

    <div class="label">SMS送信結果</div>
    <pre id="sms_result"></pre>

    <div class="label">フォロー送信予定</div>
    <pre id="follow_schedule"></pre>
  </div>

  <script>
    async function handleReply() {
      const status = document.getElementById("status");

      status.textContent = "処理中...";

      const candidate_name = document.getElementById("candidate_name").value;
      const reply_text = document.getElementById("reply_text").value;

      try {
        const res = await fetch("/handle-reply", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            candidate_name,
            reply_text
          })
        });

        const data = await res.json();

        if (!data.ok) {
          status.textContent = "エラー";
          return;
        }

        const r = data.result;

        document.getElementById("intent").textContent = r.intent;
        document.getElementById("should_send").textContent =
          r.should_send_schedule ? "送る" : "送らない";

        document.getElementById("sms").textContent = r.sms_message;
        document.getElementById("follow").textContent = r.follow_up_message;

        document.getElementById("sms_result").textContent =
          JSON.stringify(data.sms, null, 2);

        document.getElementById("follow_schedule").textContent =
          JSON.stringify(data.follow_up, null, 2);

        status.textContent = "完了";
      } catch (e) {
        status.textContent = "通信エラー";
      }
    }
  </script>
</body>
</html>
