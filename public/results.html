<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Results</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
      background: #f5f5f5;
      color: #111;
    }

    h1 {
      margin-bottom: 24px;
    }

    .toolbar {
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #111;
      color: white;
    }

    .filter-bar {
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-bar button {
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      color: #111;
    }

    .filter-bar button.active {
      background: #111;
      color: white;
      border-color: #111;
    }

    .summary {
      margin-bottom: 18px;
      padding: 14px 16px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      line-height: 1.9;
    }

    .summary-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .job-block {
      margin-top: 12px;
      padding-top: 8px;
    }

    .job-comment {
      color: #666;
      font-size: 14px;
      margin-top: 4px;
      line-height: 1.6;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
    }

    .score {
      font-size: 18px;
      font-weight: bold;
    }

    .good {
      color: #0a8a2a;
    }

    .bad {
      color: #d22;
    }

    .meta {
      color: #444;
      line-height: 1.7;
    }

    .section {
      margin-top: 14px;
    }

    .label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .message {
      background: #fafafa;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .status-row {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      background: #eee;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button.action {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #111;
      color: white;
    }

    button.sub {
      background: #666;
    }

    select {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
    }

    .empty {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    hr {
      margin: 16px 0;
      border: none;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h1>Scout Results</h1>

  <div class="toolbar">
    <button onclick="load()">再読み込み</button>
    <button onclick="downloadCsv()">CSVダウンロード</button>　
　　 <button id="autoSendBtn">自動送信開始</button>
  </div>

  <div class="filter-bar">
    <button id="filter-all" class="active" onclick="setFilter('all')">全件表示</button>
    <button id="filter-recommended" onclick="setFilter('recommended')">送付推奨のみ</button>
    <button id="filter-top3" onclick="setFilter('top3')">上位3件のみ</button>
  </div>

  <div id="summary" class="summary">読み込み中...</div>
  <div id="list">読み込み中...</div>

  <script>
    window.currentItems = [];
　　 window.currentFilter = "all";

const jobTitleMap = {
  job_cs_planning: "CS企画ポジション",
  job_sales_planning: "営業企画ポジション",
  job_revops: "RevOpsポジション"
};

    function setFilter(filterName) {
      window.currentFilter = filterName;

      document.getElementById("filter-all").classList.remove("active");
      document.getElementById("filter-recommended").classList.remove("active");
      document.getElementById("filter-top3").classList.remove("active");

      document.getElementById(`filter-${filterName}`).classList.add("active");
      renderList();
    }

    async function load() {
      const root = document.getElementById("list");
      const summary = document.getElementById("summary");

      root.innerHTML = "読み込み中...";
      summary.innerHTML = "読み込み中...";

      try {
        const res = await fetch("/scout-results");
　　　　　const data = await res.json();
　　　　　window.jobs = data.items || [];

        if (!data.items || data.items.length === 0) {
          window.currentItems = [];
          summary.innerHTML = "候補者数: 0件";
          root.innerHTML = '<div class="empty">まだ候補者がありません</div>';
          return;
        }

        const sorted = [...data.items].sort((a, b) => (b.match_score || 0) - (a.match_score || 0));
        window.currentItems = sorted;

        renderSummary(sorted);
        renderList();
      } catch (e) {
        window.currentItems = [];
        summary.innerHTML = "読み込みに失敗しました";
        root.innerHTML = '<div class="empty">読み込みエラー: ' + e.message + '</div>';
      }
    }

    function renderSummary(sorted) {
      const summary = document.getElementById("summary");

      const total = sorted.length;
      const recommendCount = sorted.filter(x => x.send_recommendation).length;

      const sentBaseStatuses = ["送信済み", "返信あり", "面談設定"];

      const sentCount = sorted.filter(x =>
        sentBaseStatuses.includes(x.sent_status)
      ).length;

      const replyCount = sorted.filter(x => x.sent_status === "返信あり").length;
      const interviewCount = sorted.filter(x => x.sent_status === "面談設定").length;
      const passCount = sorted.filter(x => x.sent_status === "見送り").length;

      const replyRate = sentCount > 0
        ? ((replyCount / sentCount) * 100).toFixed(1)
        : "0.0";

      const interviewRate = sentCount > 0
        ? ((interviewCount / sentCount) * 100).toFixed(1)
        : "0.0";

      const jobStats = {};

      sorted.forEach(item => {
        const jobId = item.job_id || "unknown";

        if (!jobStats[jobId]) {
          jobStats[jobId] = {
            total: 0,
            sent: 0,
            reply: 0,
            interview: 0
          };
        }

        jobStats[jobId].total += 1;

        const status = item.sent_status || "";

        if (
          status === "送信済み" ||
          status === "返信あり" ||
          status === "面談設定"
        ) {
          jobStats[jobId].sent += 1;
        }

        if (status === "返信あり") {
          jobStats[jobId].reply += 1;
        }

        if (status === "面談設定") {
          jobStats[jobId].interview += 1;
        }
      });

      const perJobHtml = Object.entries(jobStats)
        .map(([jobId, stat]) => {
          const jobReplyRate = stat.sent > 0
            ? ((stat.reply / stat.sent) * 100).toFixed(1)
            : "0.0";

          const jobInterviewRate = stat.sent > 0
            ? ((stat.interview / stat.sent) * 100).toFixed(1)
            : "0.0";

          const replyNum = Number(jobReplyRate);
          const interviewNum = Number(jobInterviewRate);

          let suggestion = "";

          if (stat.sent === 0) {
            suggestion = "→ 送信実績がまだないため、まずは上位候補への送信を進める";
          } else if (interviewNum >= 50) {
            suggestion = "→ 面談化率が高く、他求人への横展開候補";
          } else if (replyNum >= 50) {
            suggestion = "→ 返信率が高く、現在の訴求文を維持推奨";
          } else if (replyNum < 20) {
            suggestion = "→ 返信率が低いため、スカウト文かMust条件の見直し推奨";
          } else {
            suggestion = "→ 現状維持しつつ、返信率向上を観察";
          }

          return `
            <div class="job-block">
              <strong>${escapeHtml(jobTitleMap[jobId] || jobId)}</strong>
              候補者 ${stat.total}件 /
              返信率 ${jobReplyRate}% /
              面談化率 ${jobInterviewRate}%
              <div class="job-comment">${escapeHtml(suggestion)}</div>
            </div>
          `;
        })
        .join("");

      summary.innerHTML = `
        <div class="summary-title">全体サマリー</div>
        <div>
          候補者数: ${total}件<br>
          送付推奨: ${recommendCount}件<br>
          送信済み母数: ${sentCount}件<br>
          返信あり: ${replyCount}件（返信率 ${replyRate}%）<br>
          面談設定: ${interviewCount}件（面談化率 ${interviewRate}%）<br>
          見送り: ${passCount}件
        </div>

        <hr>

        <div class="summary-title">求人ごとの成果</div>
        <div>
          ${perJobHtml}
        </div>
      `;
    }

    function getFilteredItems() {
      const items = [...window.currentItems];

      if (window.currentFilter === "recommended") {
        return items.filter(item => item.send_recommendation);
      }

      if (window.currentFilter === "top3") {
        return items.slice(0, 3);
      }

      return items;
    }

    function renderList() {
      const root = document.getElementById("list");
      const filtered = getFilteredItems();

      if (!filtered.length) {
        root.innerHTML = '<div class="empty">該当する候補者がありません</div>';
        return;
      }

      root.innerHTML = filtered.map((item, index) => `
        <div class="card">
          <div class="top">
            <div>
              <div class="name">${index + 1}位：${escapeHtml(item.candidate_name || "名前なし")}</div>
              <div class="meta">
                求人: ${escapeHtml(jobTitleMap[item.job_id] || item.job_id || "-")}<br>
                Must: ${escapeHtml(item.must_fit || "-")} / Want: ${escapeHtml(item.want_fit || "-")}
              </div>
            </div>
            <div class="score ${item.send_recommendation ? "good" : "bad"}">
              ${item.match_score || 0}点 / ${item.send_recommendation ? "送る" : "見送り"}
            </div>
          </div>

          <div class="status-row">
            <span class="status-badge">送信状態: ${escapeHtml(item.sent_status || "未送信")}</span>

            <select id="status-${item.id}">
              <option value="未送信" ${item.sent_status === "未送信" ? "selected" : ""}>未送信</option>
              <option value="送信済み" ${item.sent_status === "送信済み" ? "selected" : ""}>送信済み</option>
              <option value="返信あり" ${item.sent_status === "返信あり" ? "selected" : ""}>返信あり</option>
              <option value="面談設定" ${item.sent_status === "面談設定" ? "selected" : ""}>面談設定</option>
              <option value="見送り" ${item.sent_status === "見送り" ? "selected" : ""}>見送り</option>
            </select>

            <button class="action sub" onclick="updateStatus('${item.id}')">状態更新</button>
          </div>

          <div class="section">
            <div class="label">送る理由</div>
            <ul>
              ${(item.why_send || []).map(x => `<li>${escapeHtml(x)}</li>`).join("")}
            </ul>
          </div>

          <div class="section">
            <div class="label">訴求ポイント</div>
            <ul>
              ${(item.appeal_points || []).map(x => `<li>${escapeHtml(x)}</li>`).join("")}
            </ul>
          </div>

          <div class="section">
  <div class="label">件名</div>
  <div class="message">
  ${escapeHtml(
    (item.scout_subject || "").replace(
      item.job_id,
      jobTitleMap[item.job_id] || item.job_id
    )
  )}
</div>

<div class="section">
  <div class="label">スカウト文</div>
  <div class="message" id="msg-${item.id}">${escapeHtml(item.scout_message || "")}</div>
  <div class="actions">
    <button class="action" onclick="copyMessage('${item.id}')">コピー</button>
  </div>
</div>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function copyMessage(id) {
      const text = document.getElementById(`msg-${id}`).innerText;
      navigator.clipboard.writeText(text);
      alert("コピーしました");
    }

    async function updateStatus(id) {
      const sent_status = document.getElementById(`status-${id}`).value;

      const res = await fetch("/update-sent-status", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ id, sent_status })
      });

      const data = await res.json();

      if (data.ok) {
        alert("更新しました");
        load();
      } else {
        alert("更新失敗: " + (data.error || "unknown error"));
      }
    }

    function downloadCsv() {
      const cards = window.currentItems || [];

      if (!cards.length) {
        alert("ダウンロードする候補者がありません");
        return;
      }

      const rows = [
  [
    "rank",
    "candidate_name",
    "job_id",
    "match_score",
    "send_recommendation",
    "sent_status",
    "must_fit",
    "want_fit",
    "why_send",
    "appeal_points",
    "scout_subject",
    "scout_message"
  ]
];

cards.forEach((item, index) => {
  rows.push([
    index + 1,
    item.candidate_name || "",
    item.job_id || "",
    item.match_score || "",
    item.send_recommendation ? "送る" : "見送り",
    item.sent_status || "",
    item.must_fit || "",
    item.want_fit || "",
    (item.why_send || []).join(" / "),
    (item.appeal_points || []).join(" / "),
    item.scout_subject || "",
    (item.scout_message || "").replace(/\n/g, " ")
  ]);
});
      const csv = rows
        .map(row =>
          row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")
        )
        .join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "scout_results.csv";
      a.click();

      URL.revokeObjectURL(url);
    }

 document.getElementById("autoSendBtn").addEventListener("click", async () => {
  const confirmed = confirm(
    "送付推奨の候補者に対して、自動でスカウトメールを送信します。実行しますか？"
  );
  if (!confirmed) return;

  try {
    const sendCandidates = (window.currentItems || [])
      .map((item) => {
        const profile = item.candidate_profile || {};

        const email =
          item.candidate_email ||
          item.email ||
          profile.email ||
          profile.mail ||
          profile.email_address ||
          "";

        return {
          id: item.candidate_id || item.id,
          candidate_id: item.candidate_id || item.id,
          name: item.candidate_name || item.name || profile.name || "",
          candidate_name: item.candidate_name || item.name || profile.name || "",
          email,
          candidate_email: email,
          job_id: item.job_id,
          score: Number(item.match_score || item.score || 0),
          recommend:
            item.send_recommendation === true ||
            item.send_recommendation === "true" ||
            item.recommend === true,
          scout_subject: item.scout_subject || "",
          scout_message: item.scout_message || "",
        };
      })
      .filter((item) => item.recommend && item.email);

    if (sendCandidates.length === 0) {
      alert("送信対象の候補者がいません");
      return;
    }

    const res = await fetch("/auto-send-scouts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        candidates: sendCandidates,
      }),
    });
    
if (!res.ok) {
  const text = await res.text();
  throw new Error(text || "自動送信失敗");
}
    const data = await res.json();

    if (!data.ok) {
      alert("自動送信失敗: " + (data.error || "unknown error"));
      return;
    }

    alert(`自動送信完了: ${sendCandidates.length}件`);
    await load();
  } catch (e) {
    alert("自動送信失敗: " + (e.message || e));
  }
});
    
    load();
  </script>
</body>
</html>
