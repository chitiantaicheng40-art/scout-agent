<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout Agent Test</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      margin-bottom: 12px;
    }

    h2 {
      margin-top: 32px;
      margin-bottom: 10px;
    }

    .sub {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .tips {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .template-box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .template-box label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .template-box select {
      width: 100%;
      max-width: 320px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 260px;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.5;
      padding: 12px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background: #111;
      color: white;
      border-radius: 8px;
    }

    button.secondary {
      background: #666;
    }

    .status {
      margin: 10px 0 18px;
      color: #444;
      font-size: 14px;
    }

    pre {
      background: white;
      padding: 16px;
      white-space: pre-wrap;
      margin-top: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      overflow-x: auto;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>Scout Agent Test</h1>
  <div class="sub">
    1人でも複数人でも評価できます。最初は営業企画 / RevOps / CS企画のテンプレで使い、後から他職種へ広げる前提です。
  </div>

  <div class="tips">
    <strong>使い方</strong><br />
    ・Candidates は <code>[ ... ]</code> で囲むと複数人評価です。<br />
    ・求人テンプレを選ぶと Job が自動で入ります。<br />
    ・結果で <code>"mode": "bulk"</code> が出れば複数人比較できています。
  </div>

  <div class="template-box">
    <label for="jobTemplate">求人テンプレ</label>
    <select id="jobTemplate" onchange="applyJobTemplate()">
      <option value="">選択してください</option>
      <option value="sales_planning">営業企画</option>
      <option value="revops">RevOps</option>
      <option value="cs_planning">CS企画</option>
      <option value="ra">人材紹介RA</option>
      <option value="ta">採用人事 / Talent Acquisition</option>
    </select>
  </div>

  <h2>Candidates</h2>
  <textarea id="candidates">[
  {
    "id": "candidate_001",
    "name": "池田太晟",
    "experience": [
      "リクルートで法人営業",
      "営業企画・業務改善に関心",
      "JFEスチールで生産管理・設備導入"
    ],
    "strengths": [
      "顧客課題整理",
      "関係者巻き込み",
      "改善提案"
    ]
  },
  {
    "id": "candidate_002",
    "name": "山田花子",
    "experience": [
      "SaaS企業で営業企画",
      "Salesforce運用",
      "KPI設計",
      "CRM改善プロジェクト"
    ],
    "strengths": [
      "データ分析",
      "CRM運用",
      "KPI設計"
    ]
  }
]</textarea>

  <h2>Job</h2>
  <textarea id="job">{
  "id": "job_001",
  "title": "営業企画 / RevOps",
  "must": [
    "法人営業経験",
    "データを使った改善経験"
  ],
  "want": [
    "SaaS",
    "営業企画",
    "CRM運用"
  ]
}</textarea>

  <div class="actions">
    <button onclick="runTest()">評価する</button>
    <button class="secondary" onclick="fillSingleSample()">1人サンプルに戻す</button>
    <button class="secondary" onclick="fillBulkSample()">2人サンプルに戻す</button>
  </div>

  <div class="status" id="status">待機中</div>

  <pre id="result">ここに結果が表示されます</pre>

  <script>
    const JOB_TEMPLATES = {
      sales_planning: {
        id: "job_sales_planning",
        title: "営業企画",
        must: [
          "法人営業経験",
          "業務改善経験"
        ],
        want: [
          "営業企画経験",
          "KPI設計",
          "関係者巻き込み"
        ]
      },
      revops: {
        id: "job_revops",
        title: "RevOps",
        must: [
          "法人営業経験",
          "データを使った改善経験"
        ],
        want: [
          "SaaS",
          "Salesforce",
          "CRM運用",
          "KPI設計"
        ]
      },
      cs_planning: {
        id: "job_cs_planning",
        title: "CS企画",
        must: [
          "顧客対応経験",
          "改善提案経験"
        ],
        want: [
          "SaaS",
          "カスタマーサクセス",
          "業務設計"
        ]
      },
      ra: {
        id: "job_ra",
        title: "人材紹介RA",
        must: [
          "法人営業経験",
          "採用支援または人材業界への関心"
        ],
        want: [
          "人材紹介経験",
          "採用課題ヒアリング",
          "候補者提案経験"
        ]
      },
      ta: {
        id: "job_ta",
        title: "採用人事 / Talent Acquisition",
        must: [
          "採用業務への関心",
          "候補者対応または対人折衝経験"
        ],
        want: [
          "中途採用経験",
          "ダイレクトリクルーティング",
          "採用広報"
        ]
      }
    };

    const singleSample = `[
  {
    "id": "candidate_001",
    "name": "池田太晟",
    "experience": [
      "リクルートで法人営業",
      "営業企画・業務改善に関心",
      "JFEスチールで生産管理・設備導入"
    ],
    "strengths": [
      "顧客課題整理",
      "関係者巻き込み",
      "改善提案"
    ]
  }
]`;

    const bulkSample = `[
  {
    "id": "candidate_001",
    "name": "池田太晟",
    "experience": [
      "リクルートで法人営業",
      "営業企画・業務改善に関心",
      "JFEスチールで生産管理・設備導入"
    ],
    "strengths": [
      "顧客課題整理",
      "関係者巻き込み",
      "改善提案"
    ]
  },
  {
    "id": "candidate_002",
    "name": "山田花子",
    "experience": [
      "SaaS企業で営業企画",
      "Salesforce運用",
      "KPI設計",
      "CRM改善プロジェクト"
    ],
    "strengths": [
      "データ分析",
      "CRM運用",
      "KPI設計"
    ]
  }
]`;

    function fillSingleSample() {
      document.getElementById("candidates").value = singleSample;
      document.getElementById("status").textContent = "1人サンプルをセットしました";
    }

    function fillBulkSample() {
      document.getElementById("candidates").value = bulkSample;
      document.getElementById("status").textContent = "2人サンプルをセットしました";
    }

    function applyJobTemplate() {
      const selected = document.getElementById("jobTemplate").value;
      if (!selected) return;

      document.getElementById("job").value =
        JSON.stringify(JOB_TEMPLATES[selected], null, 2);

      document.getElementById("status").textContent = "求人テンプレを反映しました";
    }

    async function runTest() {
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      try {
        status.textContent = "評価中...";
        result.textContent = "送信中...";

        const candidates = JSON.parse(document.getElementById("candidates").value);
        const job = JSON.parse(document.getElementById("job").value);

        const response = await fetch("/evaluate-scout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ candidates, job })
        });

        const data = await response.json();

        result.textContent = JSON.stringify(data, null, 2);

        if (data.ok) {
          status.textContent = `完了: ${data.mode || "single"} モードで評価しました`;
        } else {
          status.textContent = "APIエラーが返りました";
        }
      } catch (e) {
        result.textContent = "エラー: " + e.message;
        status.textContent = "JSON形式または通信エラーです";
      }
    }
  </script>
</body>
</html>
