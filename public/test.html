<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Scout Agent Test</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
    }
    h1 {
      margin-bottom: 24px;
    }
    h2 {
      margin-top: 32px;
    }
    textarea {
      width: 100%;
      height: 260px;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 14px;
      padding: 12px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: white;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background: #111;
      color: white;
      border-radius: 8px;
    }
    pre {
      background: white;
      padding: 16px;
      white-space: pre-wrap;
      margin-top: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      overflow-x: auto;
    }
    .sub {
      color: #666;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <h1>Scout Agent Test</h1>
  <div class="sub">1人でも複数人でも評価できます。複数人で試すときは candidates をそのまま使ってください。</div>

  <h2>Candidates</h2>
  <textarea id="candidates">[
  {
    "id": "candidate_001",
    "name": "池田太晟",
    "experience": [
      "リクルートで法人営業",
      "営業企画・業務改善に関心",
      "JFEスチールで生産管理・設備導入"
    ],
    "strengths": [
      "顧客課題整理",
      "関係者巻き込み",
      "改善提案"
    ]
  },
  {
    "id": "candidate_002",
    "name": "山田花子",
    "experience": [
      "SaaS企業で営業企画",
      "Salesforce運用",
      "KPI設計"
    ],
    "strengths": [
      "CRM運用",
      "データ分析",
      "営業改善"
    ]
  }
]</textarea>

  <h2>Job</h2>
  <textarea id="job">{
  "id": "job_001",
  "title": "営業企画 / RevOps",
  "must": [
    "法人営業経験",
    "データを使った改善経験"
  ],
  "want": [
    "SaaS",
    "営業企画",
    "CRM運用"
  ]
}</textarea>

  <button onclick="runTest()">評価する</button>

  <pre id="result">ここに結果が表示されます</pre>

  <script>
    async function runTest() {
      try {
        const candidates = JSON.parse(document.getElementById("candidates").value);
        const job = JSON.parse(document.getElementById("job").value);

        const response = await fetch("/evaluate-scout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ candidates, job })
        });

        const data = await response.json();

        document.getElementById("result").textContent =
          JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById("result").textContent =
          "エラー: " + e.message;
      }
    }
  </script>
</body>
</html>
